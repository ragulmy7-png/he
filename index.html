<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Web AR Measure</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{margin:0;background:black;color:white;font-family:system-ui}
#start{
position:fixed;inset:0;display:flex;flex-direction:column;
justify-content:center;align-items:center;background:black;z-index:10
}
#start button{
padding:15px 30px;font-size:18px;border:none;border-radius:12px;
background:#1e90ff;color:white
}
#top{
position:fixed;top:10px;width:100%;text-align:center;font-size:18px
}
#bottom{
position:fixed;bottom:20px;width:100%;text-align:center
}
button{
padding:12px 22px;font-size:15px;border:none;border-radius:10px;
background:#1e90ff;color:white
}
</style>
</head>
<body>

<div id="start">
  <h2>AR Measure Tool</h2>
  <p>Tap start to use camera</p>
  <button onclick="startAR()">START</button>
</div>

<div id="top">Tap twice to measure</div>
<div id="bottom"><button onclick="reset()">Reset</button></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/webxr/ARButton.js"></script>

<script>
let scene,camera,renderer,controller,reticle;
let hitSource=null,refSpace=null;
let startPoint=null,line=null;

function startAR(){
 document.getElementById("start").style.display="none";

 scene=new THREE.Scene();
 camera=new THREE.PerspectiveCamera();
 renderer=new THREE.WebGLRenderer({alpha:true});
 renderer.setSize(window.innerWidth,window.innerHeight);
 renderer.xr.enabled=true;
 document.body.appendChild(renderer.domElement);
 document.body.appendChild(
   ARButton.createButton(renderer,{requiredFeatures:['hit-test']})
 );

 let light=new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
 scene.add(light);

 controller=renderer.xr.getController(0);
 controller.addEventListener("select",tap);
 scene.add(controller);

 reticle=new THREE.Mesh(
  new THREE.RingGeometry(0.07,0.09,32).rotateX(-Math.PI/2),
  new THREE.MeshBasicMaterial({color:0x00ff00})
 );
 reticle.matrixAutoUpdate=false;
 reticle.visible=false;
 scene.add(reticle);

 renderer.xr.addEventListener("sessionstart",async()=>{
   let s=renderer.xr.getSession();
   let v=await s.requestReferenceSpace("viewer");
   hitSource=await s.requestHitTestSource({space:v});
   refSpace=await s.requestReferenceSpace("local");
 });

 renderer.setAnimationLoop(render);
}

function tap(){
 if(!reticle.visible)return;
 let p=new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
 if(!startPoint){
   startPoint=p.clone();
   draw(startPoint,startPoint);
 }else startPoint=null;
}

function draw(a,b){
 if(line)scene.remove(line);
 let g=new THREE.BufferGeometry().setFromPoints([a,b]);
 line=new THREE.Line(g,new THREE.LineBasicMaterial({color:0xff0000}));
 scene.add(line);
}

function reset(){
 if(line)scene.remove(line);
 line=null;startPoint=null;
 document.getElementById("top").innerText="Tap twice to measure";
}

function render(t,frame){
 if(frame&&hitSource){
  let hits=frame.getHitTestResults(hitSource);
  if(hits.length){
   let pose=hits[0].getPose(refSpace);
   reticle.visible=true;
   reticle.matrix.fromArray(pose.transform.matrix);

   if(startPoint&&line){
    let c=new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
    let arr=line.geometry.attributes.position.array;
    arr[3]=c.x;arr[4]=c.y;arr[5]=c.z;
    line.geometry.attributes.position.needsUpdate=true;
    let d=startPoint.distanceTo(c);
    document.getElementById("top").innerText=(d*100).toFixed(2)+" cm";
   }
  }else reticle.visible=false;
 }
 renderer.render(scene,camera);
}
</script>
</body>
</html>
