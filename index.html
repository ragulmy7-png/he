<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Web AR Measure</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:system-ui;background:black;color:white}
#msg{
 position:fixed;top:0;width:100%;
 background:rgba(0,0,0,.7);
 text-align:center;padding:10px;
}
</style>
</head>
<body>

<div id="msg">Press START AR</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/webxr/ARButton.js"></script>

<script>
let scene,camera,renderer;

scene=new THREE.Scene();
camera=new THREE.PerspectiveCamera();
renderer=new THREE.WebGLRenderer({alpha:true,antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.xr.enabled=true;
document.body.appendChild(renderer.domElement);

document.body.appendChild(ARButton.createButton(renderer,{requiredFeatures:['hit-test']}));

renderer.setAnimationLoop(()=>{renderer.render(scene,camera)});
</script>
</body>
</html>
