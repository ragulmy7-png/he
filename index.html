<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AR Measure App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/ARButton.js"></script>

<style>
body { margin:0; font-family: Arial; background:black; overflow:hidden; }
#info {
  position:fixed;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.7);
  color:white;
  padding:10px;
  text-align:center;
}
button {
  padding:10px 15px;
  font-size:16px;
  border-radius:8px;
}
</style>
</head>

<body>
<div id="info">Tap two points to measure</div>

<script type="module">
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/ARButton.js";

let scene, camera, renderer;
let controller;
let reticle;
let hitTestSource = null;
let hitTestSourceRequested = false;
let points = [];
let line;

init();
animate();

function init() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 20);

  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] }));

  controller = renderer.xr.getController(0);
  controller.addEventListener('select', onSelect);
  scene.add(controller);

  const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
  scene.add(light);

  reticle = new THREE.Mesh(
    new THREE.RingGeometry(0.05, 0.06, 32).rotateX(-Math.PI/2),
    new THREE.MeshBasicMaterial({ color: 0x00ff00 })
  );
  reticle.matrixAutoUpdate = false;
  reticle.visible = false;
  scene.add(reticle);
}

function onSelect() {
  if (!reticle.visible) return;

  const point = new THREE.Vector3();
  point.setFromMatrixPosition(reticle.matrix);
  points.push(point.clone());

  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(0.01),
    new THREE.MeshBasicMaterial({ color: 0xff0000 })
  );
  sphere.position.copy(point);
  scene.add(sphere);

  if (points.length === 2) {
    const geometry = new THREE.BufferGeometry().setFromPoints(points);
    line = new THREE.Line(geometry, new THREE.LineBasicMaterial({ color: 0xffff00 }));
    scene.add(line);

    const distance = points[0].distanceTo(points[1]);
    const cm = (distance * 100).toFixed(2);

    document.getElementById("info").innerHTML =
      `Distance: ${cm} cm (${distance.toFixed(2)} m)`;

    points = [];
  }
}

function animate() {
  renderer.setAnimationLoop(render);
}

function render(timestamp, frame) {
  if (frame) {
    const referenceSpace = renderer.xr.getReferenceSpace();
    const session = renderer.xr.getSession();

    if (!hitTestSourceRequested) {
      session.requestReferenceSpace('viewer').then(refSpace => {
        session.requestHitTestSource({ space: refSpace }).then(source => {
          hitTestSource = source;
        });
      });

      session.addEventListener('end', () => {
        hitTestSourceRequested = false;
        hitTestSource = null;
      });

      hitTestSourceRequested = true;
    }

    if (hitTestSource) {
      const hitTestResults = frame.getHitTestResults(hitTestSource);

      if (hitTestResults.length) {
        const hit = hitTestResults[0];
        const pose = hit.getPose(referenceSpace);

        reticle.visible = true;
        reticle.matrix.fromArray(pose.transform.matrix);
      } else {
        reticle.visible = false;
      }
    }
  }

  renderer.render(scene, camera);
}
</script>
</body>
</html>
